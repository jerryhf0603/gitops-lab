apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-web-dev
  namespace: argocd
  finalizers:
    - argocd.argoproj.io/deletion-finalizer
spec:
  project: default

  source:
    repoURL: https://github.com/jerryhf0603/gitops-lab.git
    targetRevision: main
    path: charts/demo-web

    helm:
      valueFiles:
        - ../../environments/dev/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: demo-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
